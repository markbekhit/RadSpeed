name: Clinical quality evals

on:
  workflow_dispatch:
  schedule:
    - cron: "17 21 * * 1"

permissions:
  contents: read

jobs:
  production-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Evaluate the deployed production model on synthetic cases
        run: |
          set -o pipefail
          flyctl ssh console -a voxrad-v-hkvq -C \
            "/bin/sh -lc 'cd /app && python -m evals.clinical_quality --live --minimum-pass-rate 0.80'" \
            2>&1 | tee clinical-eval.log
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Upload evaluation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clinical-eval-log
          path: clinical-eval.log
          if-no-files-found: error
          retention-days: 30
