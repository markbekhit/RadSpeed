name: Desktop CI (Windows)

# Build + lint + test the RadSpeed Tauri desktop app on every push to main
# and PR that touches desktop/. Catches Rust compile errors, clippy warnings,
# missing deps, broken Tauri capabilities, and bundler regressions before
# they reach a tagged release.

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-ci.yml"
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-ci.yml"

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: cargo check
        run: cargo check --all-targets
        shell: pwsh

      - name: cargo clippy (warnings, non-blocking)
        run: cargo clippy --all-targets
        shell: pwsh
        continue-on-error: true

      - name: cargo test
        run: cargo test --lib
        shell: pwsh

  bundle:
    runs-on: windows-latest
    needs: check
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install tauri-cli
        shell: pwsh
        run: cargo install tauri-cli --version "^2" --force 2>&1

      - name: Bundle (NSIS + MSI + updater artifacts)
        run: |
          cd src-tauri
          cargo tauri build
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: "Verify updater artifacts produced (v2 mode: .exe + .exe.sig)"
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $exe = Get-ChildItem -Recurse -Path $bundle -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $sig = Get-ChildItem -Recurse -Path $bundle -Filter "*-setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe -or -not $sig) {
            if (Test-Path $bundle) { Get-ChildItem -Recurse $bundle | Select-Object FullName, Length | Format-Table -AutoSize -Wrap }
            throw "Updater artifacts missing in CI bundle. Signing is broken. (Tauri v2 NSIS expects .exe + .exe.sig)"
          }
          Write-Host "Updater bundle OK: $($exe.Name) + $($sig.Name)"

      - name: Upload bundler output (debug aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radspeed-windows-ci
          path: |
            desktop/src-tauri/target/release/bundle/**/*.exe
            desktop/src-tauri/target/release/bundle/**/*.exe.sig
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.msi.sig
          if-no-files-found: warn
          retention-days: 7
