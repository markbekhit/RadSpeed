name: Python tests

on:
  pull_request:

concurrency:
  group: python-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test runtime
        run: |
          python -m pip install -r requirements-test.txt
          python -m playwright install --with-deps chromium

      - name: Run automated quality gates
        run: |
          set -o pipefail
          {
            python -m unittest discover -v
            python -m evals.clinical_quality
            pytest e2e --browser chromium --tracing=retain-on-failure --screenshot=only-on-failure
          } 2>&1 | tee python-tests.log

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-diagnostics
          path: python-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload browser traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
