name: Desktop release (Windows)

# Builds the RadSpeed Windows desktop companion (Tauri) and publishes a
# GitHub Release with the NSIS .exe installer, MSI installer, and the
# Tauri v2 updater artifacts (.exe + .exe.sig + update.json).
#
# Triggers on push to main that changes desktop/.trigger-release.
#
# Signing key: rsign format (scrypt KDF, empty password), embedded in the
# Bundle step env. Generated with `cargo tauri signer generate --ci -p ""`.
# The matching pubkey is in desktop/src-tauri/tauri.conf.json.
#
# IMPORTANT (Tauri 2.x v2 mode): NSIS is a "self-contained updater" — the
# .exe IS the updater artifact and is signed directly to .exe.sig.
# Tauri does NOT create a .nsis.zip wrapper in v2 mode. update.json must
# reference the .exe URL.

on:
  push:
    branches:
      - main
    paths:
      - "desktop/.trigger-release"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.17). Leave blank to auto-read."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $v = (Get-Content .trigger-release -Raw).Trim()
          }
          "VERSION=$v" >> $env:GITHUB_OUTPUT
          "TAG=desktop-v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install tauri-cli
        shell: pwsh
        run: |
          cargo install tauri-cli --version "^2" --force 2>&1
          Write-Host "tauri-cli version: $(cargo tauri --version 2>&1)"

      - name: Verify frontend assets
        shell: pwsh
        run: |
          if (-not (Test-Path "src/index.html")) { throw "src/index.html not found" }
          Write-Host "Frontend assets OK"

      - name: Bundle (NSIS + MSI + updater artifacts)
        id: bundle
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Write-Host "TAURI_SIGNING_PRIVATE_KEY length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          Set-Location src-tauri
          $logFile = "$env:RUNNER_TEMP\tauri-build.log"
          cargo tauri build --verbose 2>&1 | Tee-Object -FilePath $logFile
          $exit = $LASTEXITCODE
          Write-Host "cargo tauri build exit=$exit"
          if ($exit -ne 0) { exit $exit }

      - name: Collect artifacts and generate update.json
        id: collect
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $diagFile = "$env:RUNNER_TEMP\collect-diag.txt"
          $diag = [System.Collections.Generic.List[string]]::new()

          try {
            $version = "${{ steps.ver.outputs.VERSION }}"
            $tag     = "${{ steps.ver.outputs.TAG }}"
            $repo    = "${{ github.repository }}"

            # Absolute paths eliminate working-directory ambiguity
            $cwd       = (Resolve-Path ".").Path
            $bundleAbs = Join-Path $cwd "src-tauri\target\release\bundle"
            $outAbs    = Join-Path $cwd "release-artifacts"

            $diag.Add("PWD: $cwd")
            $diag.Add("bundleAbs: $bundleAbs")
            $diag.Add("outAbs: $outAbs")
            $diag.Add("bundle exists: $(Test-Path $bundleAbs)")

            if (-not (Test-Path $bundleAbs)) { throw "Bundle directory missing: $bundleAbs" }

            New-Item -ItemType Directory -Force -Path $outAbs | Out-Null

            # Get all files recursively from the bundle directory
            $all = Get-ChildItem -Recurse -Path $bundleAbs -File
            $diag.Add("Files in bundle ($($all.Count)):")
            foreach ($f in $all) { $diag.Add("  $($f.Name) ($($f.Length) bytes)") }
            Write-Host "Bundle contains $($all.Count) files:"
            $all | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

            # Copy relevant artifacts using absolute destination paths
            $patterns = @("*-setup.exe", "*-setup.exe.sig", "*_en-US.msi", "*_en-US.msi.sig")
            foreach ($p in $patterns) {
              $all | Where-Object { $_.Name -like $p } | ForEach-Object {
                $dest = Join-Path $outAbs $_.Name
                Copy-Item -LiteralPath $_.FullName -Destination $dest -Force
                Write-Host "copied: $($_.Name)"
                $diag.Add("copied: $($_.Name) -> $dest")
              }
            }

            # List what ended up in release-artifacts
            $collected = Get-ChildItem -Path $outAbs -File
            $diag.Add("Collected ($($collected.Count)):")
            foreach ($f in $collected) { $diag.Add("  $($f.Name) ($($f.Length) bytes)") }
            Write-Host "Collected $($collected.Count) files:"
            $collected | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

            # Find exe and sig for update.json
            $exeFile = $collected | Where-Object { $_.Name -like "*-setup.exe" } | Select-Object -First 1
            $sigFile = $collected | Where-Object { $_.Name -like "*-setup.exe.sig" } | Select-Object -First 1

            $diag.Add("exeFile: $($exeFile.Name)")
            $diag.Add("sigFile: $($sigFile.Name)")

            if (-not $exeFile) { throw "No *-setup.exe in release-artifacts (have: $($collected.Name -join ', '))" }
            if (-not $sigFile) { throw "No *-setup.exe.sig in release-artifacts (have: $($collected.Name -join ', '))" }

            Write-Host "exe: $($exeFile.Name)"
            Write-Host "sig: $($sigFile.Name)"

            # Generate update.json using absolute file reads
            $signature = [System.IO.File]::ReadAllText($sigFile.FullName).Trim()
            $url = "https://github.com/$repo/releases/download/$tag/$($exeFile.Name)"

            $manifest = [ordered]@{
              version  = $version
              notes    = "See release notes: https://github.com/$repo/releases/tag/$tag"
              pub_date = (Get-Date -UTC -Format "yyyy-MM-ddTHH:mm:ssZ")
              platforms = [ordered]@{
                "windows-x86_64" = [ordered]@{
                  signature = $signature
                  url       = $url
                }
              }
            }
            $jsonPath = Join-Path $outAbs "update.json"
            $json = $manifest | ConvertTo-Json -Depth 10
            [System.IO.File]::WriteAllText($jsonPath, $json)
            $diag.Add("update.json written: $jsonPath")
            Write-Host "update.json:"
            Get-Content $jsonPath

            "HAVE_UPDATER=true" >> $env:GITHUB_OUTPUT
            $diag.Add("HAVE_UPDATER=true")

          } catch {
            $diag.Add("ERROR: $_")
            $diag.Add("Stack: $($_.ScriptStackTrace)")
            [System.IO.File]::WriteAllLines($diagFile, $diag)
            throw
          }

          [System.IO.File]::WriteAllLines($diagFile, $diag)

      - name: Upload collect diagnostics (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collect-diag-${{ steps.ver.outputs.VERSION }}
          path: ${{ runner.temp }}/collect-diag.txt
          if-no-files-found: warn

      - name: Upload release artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radspeed-windows-${{ steps.ver.outputs.VERSION }}
          path: desktop/release-artifacts/
          if-no-files-found: warn

      - name: Upload tauri-build.log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-${{ steps.ver.outputs.VERSION }}
          path: ${{ runner.temp }}/tauri-build.log
          if-no-files-found: warn

      - name: Create GitHub Release
        if: steps.collect.outputs.HAVE_UPDATER == 'true' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ${{ steps.ver.outputs.TAG }}
          generate_release_notes: true
          files: desktop/release-artifacts/*
          fail_on_unmatched_files: true

      - name: Push diagnostics to ci-diagnostics branch
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Write ci-diag.md BEFORE any git ops that could fail
          $diagFile = "$env:RUNNER_TEMP\ci-diag.md"
          $ra = Join-Path (Resolve-Path ".").Path "release-artifacts"
          $bd = Join-Path (Resolve-Path ".").Path "src-tauri\target\release\bundle"

          $diagLines = [System.Collections.Generic.List[string]]::new()
          $diagLines.Add("# CI Diagnostics - Run ${{ github.run_id }}")
          $diagLines.Add("")
          $diagLines.Add("| Key | Value |")
          $diagLines.Add("|-----|-------|")
          $diagLines.Add("| Run ID | ${{ github.run_id }} |")
          $diagLines.Add("| SHA | ${{ github.sha }} |")
          $diagLines.Add("| Version | ${{ steps.ver.outputs.VERSION }} |")
          $diagLines.Add("| Job status | ${{ job.status }} |")
          $diagLines.Add("| HAVE_UPDATER | ${{ steps.collect.outputs.HAVE_UPDATER }} |")
          $diagLines.Add("| Time | $(Get-Date -UTC -Format 'u') |")
          $diagLines.Add("")

          if (Test-Path $bd) {
            $diagLines.Add("## Bundle directory")
            foreach ($f in (Get-ChildItem -Recurse -Path $bd -File -ErrorAction SilentlyContinue)) {
              $diagLines.Add("- $($f.Name) ($($f.Length) bytes)")
            }
            $diagLines.Add("")
          }

          if (Test-Path $ra) {
            $diagLines.Add("## Release artifacts")
            foreach ($f in (Get-ChildItem -Path $ra -File -ErrorAction SilentlyContinue)) {
              $diagLines.Add("- $($f.Name) ($($f.Length) bytes)")
            }
          } else {
            $diagLines.Add("## Release artifacts")
            $diagLines.Add("(directory missing)")
          }

          [System.IO.File]::WriteAllLines($diagFile, $diagLines)
          Write-Host "ci-diag.md written ($((Get-Item $diagFile).Length) bytes)"

          # Push to ci-diagnostics
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          $repoUrl = "https://x-access-token:$env:GITHUB_TOKEN@github.com/${{ github.repository }}.git"
          $cloneDir = "$env:RUNNER_TEMP\ci-diag-clone"
          Remove-Item -Recurse -Force -Path $cloneDir -ErrorAction SilentlyContinue

          $ok = git clone --branch ci-diagnostics --depth 1 $repoUrl $cloneDir 2>&1
          if ($LASTEXITCODE -ne 0) {
            git clone --depth 1 $repoUrl $cloneDir 2>&1
            Push-Location $cloneDir
            git checkout -b ci-diagnostics 2>&1
          } else {
            Push-Location $cloneDir
          }
          try {
            Copy-Item -LiteralPath $diagFile -Destination "ci-diag.md" -Force
            git add ci-diag.md
            git commit -m "ci: diag run=${{ github.run_id }} status=${{ job.status }} v=${{ steps.ver.outputs.VERSION }}" 2>&1
            git push origin ci-diagnostics 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Diagnostics pushed to ci-diagnostics"
            } else {
              Write-Host "Git push failed - artifact fallback available"
            }
          } finally {
            Pop-Location
          }

      - name: Upload ci-diag as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diag-${{ steps.ver.outputs.VERSION }}
          path: ${{ runner.temp }}/ci-diag.md
          if-no-files-found: warn
