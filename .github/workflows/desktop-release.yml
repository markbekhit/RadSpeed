name: Desktop release (Windows)

# Builds the RadSpeed Windows desktop companion (Tauri) and uploads the
# NSIS .exe, MSI, and auto-update bundle (.nsis.zip) to a GitHub Release.
# Also generates update.json so installed copies auto-update to this version.
#
# Triggers:
#   - push to main that changes desktop/.trigger-release (Claude pushes
#     this file with the version string, e.g. "0.2.0", to cut a release)
#   - manual via workflow_dispatch (enter version in the input field)
#
# Signing key: embedded inline in the Bundle step's env block (this is
# a private repo). The matching pubkey lives in desktop/src-tauri/
# tauri.conf.json. Generated once with `cargo tauri signer generate
# --ci -p ""` — note that this is the rsign-format key Tauri requires
# (scrypt KDF with empty password), NOT a minisign --no-password key,
# which Tauri rejects. Rotating: regenerate, replace pubkey in
# tauri.conf.json with new tauri.key.pub contents, replace
# TAURI_SIGNING_PRIVATE_KEY string in the Bundle step with new
# tauri.key contents, bump version, ship one manual install.

on:
  push:
    branches:
      - main
    paths:
      - "desktop/.trigger-release"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release as (e.g. 0.2.0). Leave blank to build artifacts only."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $v = (Get-Content .trigger-release -Raw).Trim()
          }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "TAG=desktop-v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install tauri-cli
        shell: pwsh
        run: |
          Set-Location src-tauri
          cargo install tauri-cli --version "^2" --locked --quiet
          $ver = cargo tauri --version 2>&1
          Write-Host "tauri-cli: $ver"

      - name: Verify frontend assets
        shell: pwsh
        run: |
          if (-not (Test-Path "src/index.html")) {
            throw "Frontend src/index.html not found — bundle will fail"
          }
          Write-Host "Frontend OK: $(Get-ChildItem src | Select-Object -ExpandProperty Name)"

      - name: Signing smoke test
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Write-Host "Key length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length) chars"
          $tmp = [System.IO.Path]::GetTempFileName()
          Set-Content -Path $tmp -Value "smoke-test-content"
          Set-Location src-tauri
          $output = & cargo tauri signer sign $tmp 2>&1
          Write-Host $output
          if ($LASTEXITCODE -ne 0) {
            throw "Signing smoke test FAILED (exit $LASTEXITCODE). Key may be wrong format."
          }
          Write-Host "Signing smoke test PASSED"

      - name: Build (release)
        shell: pwsh
        run: |
          Set-Location src-tauri
          cargo build --release

      - name: Bundle (NSIS + MSI + update bundle)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Set-Location src-tauri
          cargo tauri build

      - name: Verify updater bundle was produced
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $sig = Get-ChildItem -Recurse -Path $bundle -Filter "*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $zip = Get-ChildItem -Recurse -Path $bundle -Filter "*.nsis.zip"     -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sig -or -not $zip) {
            Write-Host "Bundle directory contents:"
            if (Test-Path $bundle) { Get-ChildItem -Recurse $bundle | Select-Object FullName, Length | Format-Table -AutoSize -Wrap }
            throw "Updater artifacts missing (.nsis.zip and/or .sig). Auto-update will not work — failing the build so we can see why."
          }
          Write-Host "Updater bundle: $($zip.FullName)"
          Write-Host "Signature:      $($sig.FullName)"

      - name: Collect installers and update bundle
        id: collect
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $out = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          # Full installers (for fresh installs)
          Get-ChildItem -Recurse -Path $bundle -Include *.exe,*.msi |
            ForEach-Object { Copy-Item $_.FullName $out }

          # Update bundle + signature (for auto-updates from installed copies)
          Get-ChildItem -Recurse -Path $bundle -Include *.nsis.zip,*.nsis.zip.sig |
            ForEach-Object { Copy-Item $_.FullName $out }

          Write-Host "Collected:"
          Get-ChildItem $out

      - name: Generate update.json
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          $tag     = "${{ steps.ver.outputs.TAG }}"
          $out     = "release-artifacts"
          $repo    = "markbekhit/VoxRad"

          # Read signature file (the .nsis.zip.sig content is the raw sig string)
          $sigFile = Get-ChildItem $out -Filter "*.nsis.zip.sig" | Select-Object -First 1
          if (-not $sigFile) {
            throw "No .nsis.zip.sig in release-artifacts — the Verify step should have already failed. Aborting."
          }
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()

          # Build download URL for the updater bundle
          $zipFile = Get-ChildItem $out -Filter "*.nsis.zip" | Select-Object -First 1
          $zipName = $zipFile.Name
          $url = "https://github.com/$repo/releases/download/$tag/$zipName"

          $manifest = [ordered]@{
            version  = $version
            notes    = "See release notes: https://github.com/$repo/releases/tag/$tag"
            pub_date = (Get-Date -UTC -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $url
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 "$out/update.json"
          Write-Host "update.json:"
          Get-Content "$out/update.json"

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: radspeed-windows
          path: desktop/release-artifacts/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.ver.outputs.VERSION != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ${{ steps.ver.outputs.TAG }}
          generate_release_notes: true
          files: desktop/release-artifacts/*
          fail_on_unmatched_files: true

      - name: Commit diagnostics on failure
        if: failure()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          $lines = @()
          $lines += "# CI Diagnostics - $(Get-Date -UTC -Format 'u')"
          $lines += "Version: ${{ steps.ver.outputs.VERSION }}"
          $lines += ""
          $lines += "## tauri-cli version"
          try { $lines += (cargo tauri --version 2>&1 | Out-String).Trim() } catch { $lines += "(not available)" }
          $lines += ""
          $lines += "## TAURI_SIGNING_PRIVATE_KEY length"
          $lines += "$($env:TAURI_SIGNING_PRIVATE_KEY.Length) chars"
          $lines += ""
          $lines += "## Bundle directory (src-tauri/target/release/bundle)"
          $bd = "src-tauri/target/release/bundle"
          if (Test-Path $bd) {
            Get-ChildItem -Recurse $bd | ForEach-Object { $lines += "  $($_.FullName) [$($_.Length)]"
            }
          } else {
            $lines += "  (does not exist)"
          }
          $lines += ""
          $lines += "## src-tauri/target/release top-level entries"
          $rd = "src-tauri/target/release"
          if (Test-Path $rd) {
            Get-ChildItem $rd | Select-Object -First 20 | ForEach-Object { $lines += "  $($_.Name)" }
          } else {
            $lines += "  (does not exist)"
          }
          $text = $lines -join "`n"
          $b64 = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($text))
          $api = "https://api.github.com/repos/markbekhit/VoxRad"
          $h = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json"; "X-GitHub-Api-Version" = "2022-11-28" }
          try {
            $ref = Invoke-RestMethod "$api/git/ref/heads/main" -Headers $h
            Invoke-RestMethod -Method POST "$api/git/refs" -Headers $h -ContentType "application/json" -Body (@{ref="refs/heads/ci-diagnostics";sha=$ref.object.sha}|ConvertTo-Json) -EA SilentlyContinue | Out-Null
          } catch {}
          $existing = $null
          try { $existing = Invoke-RestMethod "$api/contents/ci-diag.md?ref=ci-diagnostics" -Headers $h -EA SilentlyContinue } catch {}
          $body = @{ message="ci: failure diagnostics v${{ steps.ver.outputs.VERSION }}"; content=$b64; branch="ci-diagnostics" }
          if ($existing -and $existing.sha) { $body.sha = $existing.sha }
          Invoke-RestMethod -Method PUT "$api/contents/ci-diag.md" -Headers $h -ContentType "application/json" -Body ($body|ConvertTo-Json -Depth 5) | Out-Null
          Write-Host "Diagnostics committed to ci-diagnostics branch at ci-diag.md"
