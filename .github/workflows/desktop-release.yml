name: Desktop release (Windows)

# Builds the RadSpeed Windows desktop companion (Tauri) and publishes a
# GitHub Release with the NSIS .exe installer, MSI installer, and the
# Tauri v2 updater artifacts (.exe + .exe.sig + update.json).

on:
  push:
    branches:
      - main
    paths:
      - "desktop/.trigger-release"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Leave blank to auto-read."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $v = (Get-Content .trigger-release -Raw).Trim()
          }
          "VERSION=$v" >> $env:GITHUB_OUTPUT
          "TAG=desktop-v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Verify version consistency
        shell: pwsh
        run: |
          # The release version (from .trigger-release / dispatch input) MUST
          # match the binary's own version in tauri.conf.json and Cargo.toml.
          # Otherwise update.json advertises a version the installed binary never
          # reports, so every client downloads, installs, restarts, still sees the
          # old version, and loops forever.
          $v = "${{ steps.ver.outputs.VERSION }}"
          $conf = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargo = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value
          Write-Host "release=$v  tauri.conf.json=$conf  Cargo.toml=$cargo"
          if ($v -ne $conf)  { throw "Version mismatch: release '$v' != tauri.conf.json '$conf' — bump src-tauri/tauri.conf.json." }
          if ($v -ne $cargo) { throw "Version mismatch: release '$v' != Cargo.toml '$cargo' — bump src-tauri/Cargo.toml [package] version." }
          Write-Host "Version consistency OK"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install tauri-cli
        shell: pwsh
        run: |
          cargo install tauri-cli --version "^2" --force 2>&1
          Write-Host "tauri-cli version: $(cargo tauri --version 2>&1)"

      - name: Verify frontend assets
        shell: pwsh
        run: |
          if (-not (Test-Path "src/index.html")) { throw "src/index.html not found" }
          Write-Host "Frontend assets OK"

      - name: Bundle (NSIS + MSI + updater artifacts)
        id: bundle
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Write-Host "TAURI_SIGNING_PRIVATE_KEY length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          Set-Location src-tauri
          $logFile = "$env:RUNNER_TEMP\tauri-build.log"
          cargo tauri build --verbose 2>&1 | Tee-Object -FilePath $logFile
          $exit = $LASTEXITCODE
          Write-Host "cargo tauri build exit=$exit"
          if ($exit -ne 0) { exit $exit }

      - name: Collect artifacts and generate update.json
        id: collect
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $diagFile = "$env:RUNNER_TEMP\diag\collect-diag.txt"
          New-Item -ItemType Directory -Force -Path (Split-Path $diagFile) | Out-Null
          $diag = [System.Collections.Generic.List[string]]::new()

          try {
            $version = "${{ steps.ver.outputs.VERSION }}"
            $tag     = "${{ steps.ver.outputs.TAG }}"
            $repo    = "${{ github.repository }}"
            $cwd       = (Get-Location).Path
            $bundleAbs = Join-Path $cwd "src-tauri\target\release\bundle"
            $outAbs    = Join-Path $cwd "release-artifacts"

            $diag.Add("PWD: $cwd")
            $diag.Add("bundleAbs: $bundleAbs")
            $diag.Add("outAbs: $outAbs")

            if (-not (Test-Path $bundleAbs)) { throw "Bundle directory missing: $bundleAbs" }
            New-Item -ItemType Directory -Force -Path $outAbs | Out-Null

            $all = @(Get-ChildItem -Recurse -Path $bundleAbs -File)
            $diag.Add("Bundle files ($($all.Count)):")
            foreach ($f in $all) { $diag.Add("  $($f.Name) ($($f.Length))") }

            $patterns = @("*-setup.exe", "*-setup.exe.sig", "*_en-US.msi", "*_en-US.msi.sig")
            foreach ($p in $patterns) {
              $all | Where-Object { $_.Name -like $p } | ForEach-Object {
                $dest = Join-Path $outAbs $_.Name
                Copy-Item -LiteralPath $_.FullName -Destination $dest -Force
                Write-Host "copied: $($_.Name)"
                $diag.Add("copied: $($_.Name)")
              }
            }

            $collected = @(Get-ChildItem -Path $outAbs -File)
            $diag.Add("Collected ($($collected.Count)):")
            foreach ($f in $collected) { $diag.Add("  $($f.Name) ($($f.Length))") }

            $exeFile = $collected | Where-Object { $_.Name -like "*-setup.exe" } | Select-Object -First 1
            $sigFile = $collected | Where-Object { $_.Name -like "*-setup.exe.sig" } | Select-Object -First 1

            if (-not $exeFile) { throw "No *-setup.exe in release-artifacts" }
            if (-not $sigFile) { throw "No *-setup.exe.sig in release-artifacts" }

            $signature = [System.IO.File]::ReadAllText($sigFile.FullName).Trim()
            $url = "https://github.com/$repo/releases/download/$tag/$($exeFile.Name)"

            # Use [DateTime]::UtcNow — Get-Date -UTC does NOT exist (was the
            # bug behind v0.2.14..v0.2.18). The correct -AsUTC parameter
            # arrived in PowerShell 7.1, but UtcNow.ToString is the simplest
            # and most portable.
            $pubDate = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")

            $manifest = [ordered]@{
              version  = $version
              notes    = "See release notes: https://github.com/$repo/releases/tag/$tag"
              pub_date = $pubDate
              platforms = [ordered]@{
                "windows-x86_64" = [ordered]@{ signature = $signature; url = $url }
              }
            }
            $jsonPath = Join-Path $outAbs "update.json"
            $json = $manifest | ConvertTo-Json -Depth 10
            [System.IO.File]::WriteAllText($jsonPath, $json)
            $diag.Add("update.json written: $jsonPath")
            $diag.Add("sig length: $($signature.Length)")
            Write-Host "update.json:"
            Get-Content $jsonPath

            "HAVE_UPDATER=true" >> $env:GITHUB_OUTPUT
            $diag.Add("HAVE_UPDATER=true")
          } catch {
            $diag.Add("ERROR: $_")
            $diag.Add("Stack: $($_.ScriptStackTrace)")
            [System.IO.File]::WriteAllLines($diagFile, $diag)
            throw
          }
          [System.IO.File]::WriteAllLines($diagFile, $diag)

      - name: Upload diag files (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-${{ steps.ver.outputs.VERSION }}
          path: ${{ runner.temp }}/diag/
          if-no-files-found: warn

      - name: Upload release artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radspeed-windows-${{ steps.ver.outputs.VERSION }}
          path: desktop/release-artifacts/
          if-no-files-found: warn

      - name: Upload tauri-build.log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-${{ steps.ver.outputs.VERSION }}
          path: ${{ runner.temp }}/tauri-build.log
          if-no-files-found: warn

      - name: Create GitHub Release
        if: steps.collect.outputs.HAVE_UPDATER == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ${{ steps.ver.outputs.TAG }}
          generate_release_notes: true
          files: desktop/release-artifacts/*
          fail_on_unmatched_files: true

      - name: Push diagnostics to ci-diagnostics (bash)
        if: always()
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          CIDIAG="$RUNNER_TEMP/ci-diag.md"
          {
            echo "# CI Diagnostics - Run ${{ github.run_id }}"
            echo ""
            echo "- SHA: ${{ github.sha }}"
            echo "- Version: ${{ steps.ver.outputs.VERSION }}"
            echo "- Job status: ${{ job.status }}"
            echo "- HAVE_UPDATER: ${{ steps.collect.outputs.HAVE_UPDATER }}"
            echo "- Time: $(date -u +%FT%TZ)"
            echo ""
            echo "## collect-diag.txt"
            if [ -f "$RUNNER_TEMP/diag/collect-diag.txt" ]; then
              echo '```'
              cat "$RUNNER_TEMP/diag/collect-diag.txt"
              echo '```'
            else
              echo "(no collect-diag.txt)"
            fi
          } > "$CIDIAG"
          cat "$CIDIAG"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          CLONE_DIR="$RUNNER_TEMP/ci-diag-clone"
          rm -rf "$CLONE_DIR"
          git clone --branch ci-diagnostics --depth 1 "$REPO_URL" "$CLONE_DIR" 2>&1 || {
            git clone --depth 1 "$REPO_URL" "$CLONE_DIR" 2>&1
            git -C "$CLONE_DIR" checkout -b ci-diagnostics
          }
          cp "$CIDIAG" "$CLONE_DIR/ci-diag.md"
          mkdir -p "$CLONE_DIR/release-runs"
          cp "$CIDIAG" "$CLONE_DIR/release-runs/${{ steps.ver.outputs.VERSION }}.md"
          git -C "$CLONE_DIR" add ci-diag.md release-runs/
          git -C "$CLONE_DIR" commit -m "ci: diag run=${{ github.run_id }} v=${{ steps.ver.outputs.VERSION }}" 2>&1
          git -C "$CLONE_DIR" push origin ci-diagnostics 2>&1
