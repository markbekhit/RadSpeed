name: Desktop release (Windows)

# Builds the RadSpeed Windows desktop companion (Tauri) and uploads the
# NSIS .exe, MSI, and auto-update bundle (.nsis.zip) to a GitHub Release.
# Also generates update.json so installed copies auto-update to this version.
#
# Triggers:
#   - push to main that changes desktop/.trigger-release (Claude pushes
#     this file with the version string, e.g. "0.2.0", to cut a release)
#   - manual via workflow_dispatch (enter version in the input field)
#
# Signing key: embedded inline in the Bundle step's env block (this is
# a private repo). The matching pubkey lives in desktop/src-tauri/
# tauri.conf.json. Generated once with `cargo tauri signer generate
# --ci -p ""` -- this is the rsign-format key Tauri requires
# (scrypt KDF with empty password), NOT a minisign --no-password key,
# which Tauri rejects.

on:
  push:
    branches:
      - main
    paths:
      - "desktop/.trigger-release"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release as (e.g. 0.2.0). Leave blank to build artifacts only."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Push run-start marker (proof of life)
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN_DIAG: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msg = "Run started: id=${{ github.run_id }} sha=${{ github.sha }} at $(Get-Date -UTC -Format 'u')"
          Write-Host $msg
          $b64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($msg))
          $api = "https://api.github.com/repos/${{ github.repository }}"
          $h = @{ Authorization = "Bearer $env:GH_TOKEN_DIAG"; Accept = "application/vnd.github+json"; "X-GitHub-Api-Version" = "2022-11-28" }
          try {
            $ref = Invoke-RestMethod "$api/git/ref/heads/main" -Headers $h
            try {
              Invoke-RestMethod -Method POST "$api/git/refs" -Headers $h -ContentType "application/json" -Body (@{ref="refs/heads/ci-diagnostics";sha=$ref.object.sha}|ConvertTo-Json) | Out-Null
              Write-Host "Created ci-diagnostics branch"
            } catch { Write-Host "Branch may already exist: $($_.Exception.Message)" }
            $existing = $null
            try { $existing = Invoke-RestMethod "$api/contents/run-started.txt?ref=ci-diagnostics" -Headers $h } catch {}
            $body = @{ message="ci: run start ${{ github.run_id }}"; content=$b64; branch="ci-diagnostics" }
            if ($existing -and $existing.sha) { $body.sha = $existing.sha }
            Invoke-RestMethod -Method PUT "$api/contents/run-started.txt" -Headers $h -ContentType "application/json" -Body ($body|ConvertTo-Json -Depth 5) | Out-Null
            Write-Host "Run-start marker pushed to ci-diagnostics/run-started.txt"
          } catch {
            Write-Host "PROOF-OF-LIFE PUSH FAILED: $($_.Exception.Message)"
            Write-Host "Status: $($_.Exception.Response.StatusCode)"
          }

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $v = (Get-Content .trigger-release -Raw).Trim()
          }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "TAG=desktop-v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install tauri-cli
        shell: pwsh
        run: |
          Set-Location src-tauri
          cargo install tauri-cli --version "^2" --locked --quiet
          $ver = cargo tauri --version 2>&1
          Write-Host "tauri-cli: $ver"

      - name: Verify frontend assets
        shell: pwsh
        run: |
          if (-not (Test-Path "src/index.html")) {
            throw "Frontend src/index.html not found"
          }
          Write-Host "Frontend OK: $(Get-ChildItem src | Select-Object -ExpandProperty Name)"

      - name: Signing smoke test
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Write-Host "Key length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          $tmp = [System.IO.Path]::GetTempFileName()
          Set-Content -Path $tmp -Value "smoke-test-content"
          Set-Location src-tauri
          $out = & cargo tauri signer sign $tmp 2>&1
          Write-Host ($out | Out-String)
          if ($LASTEXITCODE -ne 0) { throw "Signing smoke test FAILED exit=$LASTEXITCODE" }
          Write-Host "Signing smoke test PASSED"

      - name: Build (release)
        shell: pwsh
        run: |
          Set-Location src-tauri
          cargo build --release

      - name: Bundle (NSIS + MSI + update bundle)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Set-Location src-tauri
          # Capture full output for diagnostics, also write to console
          $logFile = "$env:RUNNER_TEMP\tauri-build.log"
          Write-Host "Logging tauri build to $logFile"
          & cargo tauri build --verbose 2>&1 | Tee-Object -FilePath $logFile
          $exit = $LASTEXITCODE
          Write-Host "cargo tauri build exit code: $exit"
          if ($exit -ne 0) { exit $exit }

      - name: Verify updater bundle was produced
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $sig = Get-ChildItem -Recurse -Path $bundle -Filter "*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $zip = Get-ChildItem -Recurse -Path $bundle -Filter "*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sig -or -not $zip) {
            Write-Host "Bundle directory contents:"
            if (Test-Path $bundle) { Get-ChildItem -Recurse $bundle | Select-Object FullName, Length | Format-Table -AutoSize -Wrap }
            throw "Updater artifacts missing (.nsis.zip and/or .sig). Auto-update will not work."
          }
          Write-Host "Updater bundle: $($zip.FullName)"
          Write-Host "Signature:      $($sig.FullName)"

      - name: Collect installers and update bundle
        id: collect
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $out = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Get-ChildItem -Recurse -Path $bundle -Include *.exe,*.msi | ForEach-Object { Copy-Item $_.FullName $out }
          Get-ChildItem -Recurse -Path $bundle -Include *.nsis.zip,*.nsis.zip.sig | ForEach-Object { Copy-Item $_.FullName $out }
          Write-Host "Collected:"
          Get-ChildItem $out

      - name: Generate update.json
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          $tag = "${{ steps.ver.outputs.TAG }}"
          $out = "release-artifacts"
          $repo = "${{ github.repository }}"
          $sigFile = Get-ChildItem $out -Filter "*.nsis.zip.sig" | Select-Object -First 1
          if (-not $sigFile) { throw "No .nsis.zip.sig in release-artifacts" }
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          $zipFile = Get-ChildItem $out -Filter "*.nsis.zip" | Select-Object -First 1
          $url = "https://github.com/$repo/releases/download/$tag/$($zipFile.Name)"
          $manifest = [ordered]@{
            version = $version
            notes = "See release notes: https://github.com/$repo/releases/tag/$tag"
            pub_date = (Get-Date -UTC -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = $url
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 "$out/update.json"
          Get-Content "$out/update.json"

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: radspeed-windows
          path: desktop/release-artifacts/*
          if-no-files-found: warn

      - name: Create GitHub Release
        if: steps.ver.outputs.VERSION != '' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ${{ steps.ver.outputs.TAG }}
          generate_release_notes: true
          files: desktop/release-artifacts/*
          fail_on_unmatched_files: true

      - name: End-of-run diagnostics (always)
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN_DIAG: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          JOB_STATUS: ${{ job.status }}
        run: |
          $lines = New-Object System.Collections.ArrayList
          [void]$lines.Add("# CI Diagnostics v${{ steps.ver.outputs.VERSION }}")
          [void]$lines.Add("Run id : ${{ github.run_id }}")
          [void]$lines.Add("SHA    : ${{ github.sha }}")
          [void]$lines.Add("Status : $env:JOB_STATUS")
          [void]$lines.Add("Time   : $(Get-Date -UTC -Format 'u')")
          [void]$lines.Add("")
          [void]$lines.Add("## tauri-cli version")
          try { [void]$lines.Add((cargo tauri --version 2>&1 | Out-String).Trim()) } catch { [void]$lines.Add("(not available: $($_.Exception.Message))") }
          [void]$lines.Add("")
          [void]$lines.Add("## TAURI_SIGNING_PRIVATE_KEY length")
          [void]$lines.Add("$($env:TAURI_SIGNING_PRIVATE_KEY.Length) chars")
          [void]$lines.Add("")
          [void]$lines.Add("## Tauri build log (last 200 lines)")
          $logFile = "$env:RUNNER_TEMP\tauri-build.log"
          if (Test-Path $logFile) {
            $tail = Get-Content $logFile -Tail 200
            foreach ($l in $tail) { [void]$lines.Add($l) }
          } else {
            [void]$lines.Add("(log file not found at $logFile -- bundle step did not run or failed before logging)")
          }
          [void]$lines.Add("")
          [void]$lines.Add("## Bundle directory")
          $bd = "src-tauri/target/release/bundle"
          if (Test-Path $bd) {
            $items = Get-ChildItem -Recurse $bd
            if ($items.Count -eq 0) { [void]$lines.Add("(directory exists but is empty)") }
            foreach ($i in $items) { [void]$lines.Add("$($i.FullName) [$($i.Length)]") }
          } else {
            [void]$lines.Add("(does not exist)")
          }
          [void]$lines.Add("")
          [void]$lines.Add("## src-tauri/target/release top entries")
          $rd = "src-tauri/target/release"
          if (Test-Path $rd) {
            foreach ($i in (Get-ChildItem $rd | Select-Object -First 30)) { [void]$lines.Add($i.Name) }
          } else {
            [void]$lines.Add("(does not exist)")
          }
          $text = ($lines -join "`n")
          Write-Host "=== DIAG TEXT BEGIN ==="
          Write-Host $text
          Write-Host "=== DIAG TEXT END ==="
          $b64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($text))
          $api = "https://api.github.com/repos/${{ github.repository }}"
          $h = @{ Authorization = "Bearer $env:GH_TOKEN_DIAG"; Accept = "application/vnd.github+json"; "X-GitHub-Api-Version" = "2022-11-28" }
          try {
            $ref = Invoke-RestMethod "$api/git/ref/heads/main" -Headers $h
            try { Invoke-RestMethod -Method POST "$api/git/refs" -Headers $h -ContentType "application/json" -Body (@{ref="refs/heads/ci-diagnostics";sha=$ref.object.sha}|ConvertTo-Json) | Out-Null } catch {}
          } catch { Write-Host "Failed to read main ref: $($_.Exception.Message)" }
          $existing = $null
          try { $existing = Invoke-RestMethod "$api/contents/ci-diag.md?ref=ci-diagnostics" -Headers $h } catch {}
          $body = @{ message="ci: diag run=${{ github.run_id }} status=$env:JOB_STATUS"; content=$b64; branch="ci-diagnostics" }
          if ($existing -and $existing.sha) { $body.sha = $existing.sha }
          try {
            Invoke-RestMethod -Method PUT "$api/contents/ci-diag.md" -Headers $h -ContentType "application/json" -Body ($body|ConvertTo-Json -Depth 5) | Out-Null
            Write-Host "Diagnostics committed to ci-diagnostics/ci-diag.md"
          } catch {
            Write-Host "PUT failed: $($_.Exception.Message)"
            Write-Host "Status: $($_.Exception.Response.StatusCode)"
          }
